<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Smart Waste System</title>

<style>
body{
  margin:0;
  font-family:Poppins, sans-serif;
  background:#0b0b0b;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.card{
  background:#141414;
  padding:40px;
  width:350px;
  border-radius:12px;
  text-align:center;
  border:1px solid #242424;
}

h1{
  color:#40a9ff;
  margin-bottom:25px;
  font-weight:600;
}

input, select{
  width:100%;
  padding:12px;
  border-radius:6px;
  border:none;
  margin:10px 0;
  background:#1d1d1d;
  color:white;
  border:1px solid #333;
}

button{
  width:100%;
  padding:12px;
  background:#40a9ff;
  color:black;
  font-weight:600;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#1e90ff;
}

a{
  margin-top:12px;
  display:block;
  color:#40a9ff;
  text-decoration:none;
  font-size:14px;
}

a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="card">

  <h1>🚮 Smart Waste System</h1>

  <select id="role">
    <option value="user">User</option>
    <option value="collector">Collector</option>
    <option value="admin">Admin</option>
  </select>

  <input id="email" placeholder="Enter Email">
  <input id="pass" type="password" placeholder="Enter Password">

  <button id="loginBtn">Login</button>

  <a href="signup.html">Don't have an account? Create one</a>

</div>

<script>
document.getElementById("loginBtn").onclick = async ()=>{
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("pass").value.trim();
  const role = document.getElementById("role").value;

  if(!email || !password) return alert("Please fill all fields");

  const r = await fetch("http://localhost:3000/api/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password,role})
  });

  if(r.status !== 200) return alert("Invalid Credentials");

  const data = await r.json();

  // Verify selected role matches account role
  if(data.role !== role){
      return alert("❌ Incorrect role selected!");
  }

  localStorage.setItem("user_email", data.email);
  localStorage.setItem("role", data.role);

  if(role === "admin") window.location.href="admin.html";
  else if(role === "collector") window.location.href="collector.html";
  else window.location.href="track.html";
};
</script>

</body>
</html>
